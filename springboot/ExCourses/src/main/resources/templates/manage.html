<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수강과목 관리</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .back-btn {
        padding: 10px 20px;
        background-color: white;
        color: #2563eb;
        border: 1px solid #2563eb;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }
      .back-btn:hover {
        background-color: #2563eb;
        color: white;
      }

      .add-btn {
        padding: 10px 20px;
        background-color: #2563eb;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .add-btn:hover {
        background-color: #1d4ed8;
      }

      /* 모달 */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }

      .modal {
        background: white;
        border-radius: 8px;
        padding: 28px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }
      .modal h3 {
        margin: 0 0 20px 0;
        font-size: 18px;
        color: #111;
        border-bottom: 2px solid #e5e7eb;
        padding-bottom: 12px;
      }

      .form-group {
        margin-bottom: 14px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #444;
        margin-bottom: 5px;
      }
      .form-group input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        font-size: 14px;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      .form-group input:focus {
        outline: none;
        border-color: #2563eb;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 20px;
      }

      .btn-save {
        padding: 8px 20px;
        background-color: #2563eb;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
      .btn-save:hover {
        background-color: #1d4ed8;
      }

      .btn-cancel-modal {
        padding: 8px 20px;
        background-color: white;
        color: #666;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
      }
      .btn-cancel-modal:hover {
        background-color: #f5f5f5;
      }

      /* 테이블 */
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      thead tr {
        background-color: #f9fafb;
        border-bottom: 2px solid #e5e7eb;
      }
      th {
        padding: 10px 12px;
        text-align: left;
        font-weight: 600;
        color: #555;
        white-space: nowrap;
      }
      td {
        padding: 12px 12px;
        border-bottom: 1px solid #f0f0f0;
        color: #333;
      }
      tr:hover td {
        background-color: #fafafa;
      }

      .edit-btn {
        padding: 5px 12px;
        background-color: white;
        color: #2563eb;
        border: 1px solid #2563eb;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        margin-right: 4px;
      }
      .edit-btn:hover {
        background-color: #2563eb;
        color: white;
      }

      .del-btn {
        padding: 5px 12px;
        background-color: white;
        color: #dc2626;
        border: 1px solid #dc2626;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
      }
      .del-btn:hover {
        background-color: #dc2626;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header class="header">
        <h1>수강과목 관리</h1>
        <div style="display: flex; gap: 10px">
          <button class="add-btn" onclick="openModal()">+ 과목 추가</button>
          <button class="back-btn" onclick="back()">← 메인으로</button>
        </div>
      </header>

      <div class="section">
        <h2>등록된 강좌 목록</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>과목명</th>
                <th>교수명</th>
                <th>시간</th>
                <th>학점</th>
                <th>정원</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="courseTableBody"></tbody>
          </table>
          <div id="emptyMsg" class="empty" style="display: none">
            등록된 강좌가 없습니다. 과목을 추가해주세요.
          </div>
        </div>
      </div>
    </div>

    <!-- 추가/수정 모달 -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h3 id="modalTitle">과목 추가</h3>
        <input type="hidden" id="editId" value="" />

        <div class="form-group">
          <label>과목명</label>
          <input type="text" id="fieldName" placeholder="예) 자료구조론" />
        </div>
        <div class="form-group">
          <label>교수명</label>
          <input type="text" id="fieldProfessor" placeholder="예) 홍길동" />
        </div>
        <div class="form-group">
          <label>시간</label>
          <input
            type="text"
            id="fieldTime"
            placeholder="예) 월수 10:00~11:30"
          />
        </div>
        <div class="form-group">
          <label>학점</label>
          <input
            type="number"
            id="fieldCredits"
            placeholder="예) 3"
            min="1"
            max="6"
          />
        </div>
        <div class="form-group">
          <label>정원</label>
          <input
            type="number"
            id="fieldCapacity"
            placeholder="예) 30"
            min="1"
          />
        </div>

        <div class="modal-actions">
          <button class="btn-cancel-modal" onclick="closeModal()">취소</button>
          <button class="btn-save" onclick="saveCourse()">저장</button>
        </div>
      </div>
    </div>

    <script>
      let courses = [];

      document.addEventListener("DOMContentLoaded", function () {
        fetch("/manage", {
          method: "POST",
        })
          .then((response) => {
            return response.json();
          })
          .then((json) => {
            console.log("DB 데이터:", json);
            courses = json;
            renderTable();
          })
          .catch((error) => {
            console.error("데이터 불러오기 실패:", error);
          });
      });

      function renderTable() {
        const tbody = document.getElementById("courseTableBody");
        const emptyMsg = document.getElementById("emptyMsg");

        if (courses.length === 0) {
          tbody.innerHTML = "";
          emptyMsg.style.display = "block";
          return;
        }

        emptyMsg.style.display = "none";
        tbody.innerHTML = courses
          .map(
            (c) => `
          <tr>
            <td><strong>${c.name}</strong></td>
            <td>${c.professor}</td>
            <td>${c.time}</td>
            <td>${c.credits}학점</td>
            <td>${c.enrolled}/${c.capacity}명</td>
            <td>
              <button class="edit-btn" onclick="openModal(${c.courseId})">수정</button>
              <button class="del-btn" onclick="deleteCourse(${c.courseId})">삭제</button>
            </td>
          </tr>`,
          )
          .join("");
      }

      function openModal(courseId) {
        document.getElementById("modalOverlay").classList.add("open");

        if (courseId !== undefined) {
          const c = courses.find((x) => x.courseId === Number(courseId));
          document.getElementById("modalTitle").textContent = "과목 수정";
          document.getElementById("editId").value = courseId;
          document.getElementById("fieldName").value = c.name;
          document.getElementById("fieldProfessor").value = c.professor;
          document.getElementById("fieldTime").value = c.time;
          document.getElementById("fieldCredits").value = c.credits;
          document.getElementById("fieldCapacity").value = c.capacity;
        } else {
          document.getElementById("modalTitle").textContent = "과목 추가";
          document.getElementById("editId").value = "";
          document.getElementById("fieldName").value = "";
          document.getElementById("fieldProfessor").value = "";
          document.getElementById("fieldTime").value = "";
          document.getElementById("fieldCredits").value = "";
          document.getElementById("fieldCapacity").value = "";
        }
      }

      function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
      }

      function saveCourse() {
        const name = document.getElementById("fieldName").value.trim();
        const professor = document
          .getElementById("fieldProfessor")
          .value.trim();
        const time = document.getElementById("fieldTime").value.trim();
        const credits = Number(document.getElementById("fieldCredits").value);
        const capacity = Number(document.getElementById("fieldCapacity").value);

        if (!name || !professor || !time || !credits || !capacity) {
          alert("모든 항목을 입력해주세요.");
          return;
        }

        const editId = document.getElementById("editId").value;
        const params = new URLSearchParams({
          name,
          professor,
          time,
          credits,
          capacity,
        });

        if (editId) {
          // 수정 → POST /manage/update
          params.append("editId", editId);
          fetch(`/manage/update?${params.toString()}`, { method: "POST" })
            .then((res) => res.text())
            .then(() => {
              courses = courses.map((c) =>
                c.courseId === Number(editId)
                  ? { ...c, name, professor, time, credits, capacity }
                  : c,
              );
              renderTable();
              closeModal();
            })
            .catch((error) => console.error("수정 실패:", error));
        } else {
          // 추가 → POST /manage/save 후 목록 재조회
          fetch(`/manage/save?${params.toString()}`, { method: "POST" })
            .then((res) => res.text())
            .then(() => fetch("/manage", { method: "POST" }))
            .then((res) => res.json())
            .then((json) => {
              courses = json;
              renderTable();
              closeModal();
            })
            .catch((error) => console.error("추가 실패:", error));
        }
      }

      function deleteCourse(courseId) {
        if (!confirm("이 과목을 삭제하시겠습니까?")) return;
        // 삭제 → POST /manage/delete
        fetch(`/manage/delete?courseId=${courseId}`, { method: "POST" })
          .then((res) => res.text())
          .then(() => {
            courses = courses.filter((c) => c.courseId !== Number(courseId));
            renderTable();
          })
          .catch((error) => console.error("삭제 실패:", error));
      }

      function back() {
        window.location.href = "/";
      }

      // 모달 바깥 클릭 시 닫기
      document
        .getElementById("modalOverlay")
        .addEventListener("click", function (e) {
          if (e.target === this) closeModal();
        });
    </script>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>계산기</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .wrapper {
        width: 420px;
        height: 100%;
        margin: 40px auto;
        border: 1px solid #333;
        padding: 30px 40px 40px;
        display: flex;
        flex-direction: column;
      }
      h1 {
        font-size: 24px;
        display: flex;
        justify-content: center;
        margin-bottom: 24px;
      }
      form {
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 14px;
      }
      .inputbox {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .inputbox:last-of-type {
        margin-bottom: 14px;
      }
      .inputbox > label {
        width: 26%;
      }
      .inputbox > input {
        width: 100%;
        height: 38px;
        text-align: center;
        font-size: 16px;
        font-weight: bold;
        padding-top: 2px;
      }
      .inputNum > input {
        background: #d3d3d3;
        border: 0;
        border-radius: 2px;
        color: #333;
      }
      .inputResult > input {
        background: #757575;
        border: 0;
        border-radius: 2px;
        color: #fff;
      }
      button {
        font-size: 15px;
        height: 40px;
        color: #f8f8f8;
        cursor: pointer;
      }
      .claculation {
        background: #286cd2;
        border: 0;
        border-radius: 2px;
      }
      .clearInput {
        background: #f13233;
        border: 0;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <h1>계산기</h1>
      <form action="/" method="post">
        <div class="inputbox inputNum">
          <label for="input1">숫자1</label>
          <input type="text" id="input1" name="input1" th:value="${input1}" />
        </div>
        <div class="inputbox inputNum">
          <label for="input2">숫자2</label>
          <input type="text" id="input2" name="input2" th:value="${input2}" />
        </div>
        <div class="inputbox inputResult">
          <label for="result">연산 결과</label>
          <input
            type="text"
            id="result"
            name="result"
            th:value="${result}"
            disabled
          />
        </div>

        <button class="claculation" formaction="/add">덧셈</button>
        <button class="claculation" formaction="/sub">뺄셈</button>
        <button class="claculation" formaction="/mul">곱셈</button>
        <button class="claculation" formaction="/div">나눗셈</button>
        <button class="clearInput" type="button" onclick="clearInput()">
          지우기
        </button>
      </form>
    </div>

    <script>
      function clearInput() {
        window.location.href = "/";

        const input1 = document.getElementById("input1");
        const input2 = document.getElementById("input2");
        const result = document.getElementById("result");

        input1.value = "";
        input2.value = "";
        result.value = "";
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 페이지</title>
    <link rel="stylesheet" href="/css/common.css" />
  </head>
  <body>
    <div class="wrap">
      <div id="login">
        <h1>로그인</h1>

        <form class="contentWrap" action="/" methoe="post">
          <div class="formList">
            <label for="username">
              <img src="/img/username.png" alt="아이디" />
            </label>
            <input
              type="text"
              id="username"
              name="memberUsername"
              placeholder="아이디"
              value=""
            />
          </div>
          <div class="formList">
            <label for="password">
              <img src="/img/password.png" alt="비밀번호" />
            </label>
            <input
              type="password"
              id="password"
              name="memberPassword"
              placeholder="비밀번호"
              value=""
            />
          </div>
        </form>

        <button class="btnPrimary" type="button" onclick="login()">
          로그인
        </button>
        <div class="btnTaxtWrap">
          <a href="#" class="btnText" type="button" onclick="join()">
            회원가입
          </a>
        </div>
      </div>

      <div id="success">
        <h1>로그인 완료 되었습니다.</h1>
        <p class="successMessage contentWrap fontSize">
          <span class="fontSize color" id="successUsername"></span>님 즐거운
          하루되세요
        </p>
        <button class="btnPrimary" type="button" onclick="ok()">확인</button>
      </div>
    </div>

    <script>
      const username = document.getElementById("username");
      const password = document.getElementById("password");
      let loginDoc = document.getElementById("login");
      let successDoc = document.getElementById("success");

      function login() {
        if (username.value === null || username.value === "") {
          alert("아이디를 입력해주세요.");
          return;
        }
        if (password.value === null || password.value === "") {
          alert("비밀번호를 입력해주세요.");
          return;
        }

        let successUsername = document.getElementById("successUsername");
        successUsername.innerText = username.value;

        fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            memberUsername: username.value,
            memberPassword: password.value,
          }),
        })
          .then((response) => {
            if (!response.ok) {
              return response.text().then((message) => {
                throw new Error(message);
              });
            }
            return response.text();
          })
          .then((text) => {
            console.log(text);

            if (text === "admin") {
              window.location.href = "/admin";
            } else if (text === "user") {
              loginDoc.style.display = "none";
              successDoc.style.display = "block";
            }
          })
          .catch((error) => {
            alert(error.message);
            loginDoc.style.display = "block";
            successDoc.style.display = "none";
          });
      }

      function join() {
        window.location.href = "/join";
      }
      function ok() {
        window.location.href = "/";
      }
    </script>
  </body>
</html>

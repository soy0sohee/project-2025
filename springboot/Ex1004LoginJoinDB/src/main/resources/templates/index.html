<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 페이지</title>
    <link rel="stylesheet" href="../static/css/common.css" />
  </head>
  <body>
    <div id="login">
      <h1>로그인</h1>
      <form action="/login" methoe="post">
        <div>
          <label for="username"
            ><img src="../static/img/username.png" alt="아이디"
          /></label>
          <input
            type="text"
            id="username"
            name="memberUsername"
            placeholder="Your Name"
            value=""
          />
        </div>
        <div>
          <label for="password"
            ><img src="../static/img/password.png" alt="비밀번호"
          /></label>
          <input
            type="password"
            id="password"
            name="memberPassword"
            placeholder="Your password"
            value=""
          />
        </div>
      </form>
      <button>로그인</button>
      <a href="#">회원가입</a>
    </div>

    <div id="join">
      <h1>로그인 완료 되었습니다.</h1>
      <p><b id="username">홍길동</b>님 즐거운 하루되세요</p>
    </div>
  </body>
</html>
